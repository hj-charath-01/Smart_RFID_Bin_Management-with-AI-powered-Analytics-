<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smart Bin 3D View</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
      color: #0f0;
      font-family: monospace;
    }
    #infoBox {
      position: absolute;
      bottom: 15px;
      left: 15px;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid #0f0;
      border-radius: 5px;
      padding: 10px 15px;
      font-size: 14px;
      min-width: 200px;
      line-height: 1.5;
    }
    #infoBox span.value {
      color: #0ff;
    }
  </style>
</head>
<body>
  <div id="infoBox">
    RFID: <span id="rfid" class="value">Waiting...</span><br>
    Fill Level: <span id="fill" class="value">--%</span><br>
    Tag ID: <span id="tag" class="value">--</span><br>
    Status: <span id="status" class="value">--</span>
  </div>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    // === SETUP ===
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 1.2);
    const directional = new THREE.DirectionalLight(0xffffff, 1.2);
    directional.position.set(5, 10, 7);
    scene.add(ambient, directional);

    // === MODEL ===
    let binMesh = null;
    const loader = new THREE.GLTFLoader();

    loader.load(
      '/static/models/rfid_readwrite_module_rc522.glb',
      (gltf) => {
        console.log("✅ Model loaded");
        binMesh = gltf.scene;
        binMesh.scale.set(2, 2, 2);
        binMesh.position.set(0, -1, 0);

        const box = new THREE.Box3().setFromObject(binMesh);
        const center = box.getCenter(new THREE.Vector3());
        binMesh.position.sub(center);
        scene.add(binMesh);

        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        camera.position.set(0, 1, maxDim * 2.5);
      },
      (xhr) => console.log(`Loading ${(xhr.loaded / xhr.total * 100).toFixed(1)}%`),
      (err) => console.error("❌ Error loading model:", err)
    );

    camera.position.z = 5;

    // === INFO ELEMENTS ===
    const info = {
      rfid: document.getElementById("rfid"),
      fill: document.getElementById("fill"),
      tag: document.getElementById("tag"),
      status: document.getElementById("status")
    };

    // === BACKEND DATA ===
    const binID = new URLSearchParams(window.location.search).get("bin");
    let currentFill = 0;

    // === ANIMATION LOOP ===
    function animate() {
      requestAnimationFrame(animate);
      if (binMesh) {
        binMesh.rotation.y += 0.01;
        binMesh.scale.y = 2 + currentFill / 100 * 0.5;
      }
      renderer.render(scene, camera);
    }
    animate();

    // === FETCH INITIAL BIN DATA ===
    async function fetchBinData() {
      try {
        const response = await fetch(`http://127.0.0.1:8000/bin/${binID}`);
        if (!response.ok) throw new Error("Failed to fetch bin");
        const bin = await response.json();
        updateBinInfo(bin);
      } catch (err) {
        console.error("Error fetching bin data:", err);
      }
    }

    // === LIVE UPDATES VIA WEBSOCKET ===
    const ws = new WebSocket("ws://127.0.0.1:8000/ws");

    ws.onopen = () => {
      console.log("✅ WebSocket connected");
      fetchBinData();
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === "fill_update" && msg.bin_id === binID) {
        updateBinInfo(msg.bin);
      }
    };

    ws.onclose = () => {
      console.warn("❌ WebSocket disconnected");
      info.status.textContent = "Connection Lost";
    };

    // === UPDATE INFO BOX + MODEL COLOR ===
    function updateBinInfo(bin) {
      currentFill = bin.fill_pct || 0;
      info.rfid.textContent = "Active";
      info.fill.textContent = `${currentFill.toFixed(1)}%`;
      info.tag.textContent = bin.rfid;
      info.status.textContent = currentFill >= 100 ? "⚠️ FULL" : "Operational";

      if (binMesh) {
        binMesh.traverse(o => {
          if (o.isMesh) o.material.color.set(currentFill >= 100 ? 0xff0000 : 0x00ff00);
        });
      }
    }

    // === HANDLE WINDOW RESIZE ===
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
